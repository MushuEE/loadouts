version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./loadouts/backend/migrations:/docker-entrypoint-initdb.d

  backend:
    build:
      context: .
      dockerfile: loadouts/backend/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/inventory?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
